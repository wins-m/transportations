<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>交通轨迹地图</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    body { margin: 0; }
    #map { height: 100vh; width: 100vw; }
    .legend { 
      padding: 10px; 
      background: white; 
      border-radius: 5px; 
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([30, 110], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // City coordinates
    var cityCoords = {
      "宁波": [29.8669, 121.5404],
      "杭州东": [30.2925, 120.2119],
      "上海虹桥": [31.1945, 121.3188],
      "龙洞堡T3": [26.5385, 106.8007],
      "萧山T4": [30.2350, 120.4340]
    };
    // Create smaller markers
    var smallIcon = L.icon({
      iconUrl: 'https://unpkg.com/leaflet/dist/images/marker-icon.png',
      iconSize: [20, 30],  // Smaller size (original: [25, 41])
      iconAnchor: [10, 15], // Anchor point adjustment
      popupAnchor: [0, -15] // Popup position adjustment
    });
    // Add markers with smaller size
    Object.keys(cityCoords).forEach(function(city) {
      var coords = cityCoords[city];
      L.marker(coords, {icon: smallIcon})
        .addTo(map)
        .bindPopup("<b>" + city + "</b><br>坐标: " + coords[0].toFixed(4) + ", " + coords[1].toFixed(4));
    });

    // 5 sample routes (sorted by type and date)
    var travelSegments = [
      // Rail segments (newest first)
      {
        type: "Rail", 
        date: "2025-04-02", 
        from: "宁波", 
        to: "杭州东", 
        vehicle: "D3146", 
        duration: "01:04:00", 
        distance: "155 km", 
        seat: "07车05A", 
        price: "57", 
        note: "积分兑换"
      },
      {
        type: "Rail", 
        date: "2024-12-01", 
        from: "上海虹桥", 
        to: "杭州东", 
        vehicle: "D3101", 
        duration: "01:10:00", 
        distance: "159 km", 
        seat: "07车11C", 
        price: "59", 
        note: "积分改签"
      },
      
      // Air segments
      {
        type: "Airway", 
        date: "2024-08-04", 
        from: "龙洞堡T3", 
        to: "萧山T4", 
        vehicle: "CZ2190", 
        duration: "02:04:00", 
        distance: "1538 km", 
        seat: "38K", 
        price: "1330", 
        note: ""
      },
      
      // Other transport
      {
        type: "Other", 
        date: "2024-06-20", 
        from: "宁波", 
        to: "上海虹桥", 
        vehicle: "长途巴士", 
        duration: "03:30:00", 
        distance: "220 km", 
        seat: "12座", 
        price: "120", 
        note: "临时替代方案"
      },
      {
        type: "Other", 
        date: "2023-11-15", 
        from: "杭州东", 
        to: "宁波", 
        vehicle: "拼车", 
        duration: "02:15:00", 
        distance: "155 km", 
        seat: "", 
        price: "80", 
        note: "夜间行程"
      }
    ];

    // Sort by type (Rail > Airway > Other) then by date (newest first)
    travelSegments.sort((a, b) => {
      const typeOrder = {Rail: 1, Airway: 2, Other: 3};
      if (typeOrder[a.type] !== typeOrder[b.type]) {
        return typeOrder[a.type] - typeOrder[b.type];
      }
      return new Date(b.date) - new Date(a.date);
    });

    // Draw routes with enhanced popups
    travelSegments.forEach(segment => {
      const from = cityCoords[segment.from];
      const to = cityCoords[segment.to];
      
      if (from && to) {
        const color = {
          Rail: 'blue',
          Airway: 'red',
          Other: 'green'
        }[segment.type];
        
        const polyline = L.polyline([from, to], {
          color: color,
          weight: 3,
          opacity: 0.7
        }).addTo(map);
        
        // Detailed popup with icons
        const popupContent = `
          <div style="min-width:200px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-weight:bold;font-size:1.1em">${segment.from} → ${segment.to}</span>
              <span style="background:${color};color:white;padding:2px 6px;border-radius:4px;font-size:0.8em">
                ${segment.type === 'Rail' ? '🚄 铁路' : segment.type === 'Airway' ? '✈️ 航空' : '🚌 其他'}
              </span>
            </div>
            <table style="width:100%;font-size:0.9em">
              <tr><td style="width:60px">日期：</td><td>${segment.date}</td></tr>
              <tr><td>车次：</td><td>${segment.vehicle}</td></tr>
              <tr><td>用时：</td><td>${segment.duration}</td></tr>
              ${segment.distance ? `<tr><td>距离：</td><td>${segment.distance}</td></tr>` : ''}
              ${segment.seat ? `<tr><td>座位：</td><td>${segment.seat}</td></tr>` : ''}
              ${segment.price ? `<tr><td>票价：</td><td>${segment.price}元</td></tr>` : ''}
              ${segment.note ? `<tr><td>备注：</td><td><i>${segment.note}</i></td></tr>` : ''}
            </table>
          </div>
        `;
        
        polyline.bindPopup(popupContent);
      }
    });

    // Enhanced legend
    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <h4 style="margin:4px 0">交通类型</h4>
        <div style="display:flex;align-items:center;gap:6px;margin:4px 0">
          <div style="background:blue;width:16px;height:16px"></div>
          <span>铁路</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin:4px 0">
          <div style="background:red;width:16px;height:16px"></div>
          <span>航空</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin:4px 0">
          <div style="background:green;width:16px;height:16px"></div>
          <span>其他</span>
        </div>
      `;
      return div;
    };
    legend.addTo(map);

  </script>
</body>
</html>
